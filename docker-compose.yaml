services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: golang-hexagonal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-hexagonal_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./internal/migrations:/docker-entrypoint-initdb.d
    networks:
      - hexagonal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: golang-hexagonal-redis
    restart: unless-stopped
    command: redis-server --requirepass ${CACHE_PASSWORD:-redis123}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - hexagonal-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Application
  app:
    image: golang-hexagonal:latest
    container_name: golang-hexagonal-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Database configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-hexagonal_db}

      # Redis configuration
      CACHE_URI: redis:6379
      CACHE_PASSWORD: ${CACHE_PASSWORD:-redis123}

      # Application configuration
      GIN_MODE: ${GIN_MODE:-release}

      # Firebase configuration (if needed)
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CREDENTIALS: ${FIREBASE_CREDENTIALS:-}

      # Stripe configuration (if needed)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hexagonal-network
    # Uncomment if you need to mount .env or credentials file
    # volumes:
    #   - ./.env:/home/appuser/.env:ro
    #   - ./firebase-credentials.json:/home/appuser/firebase-credentials.json:ro

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  hexagonal-network:
    driver: bridge
