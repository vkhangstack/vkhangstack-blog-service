services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: cms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-hexagonal_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./internal/migrations:/docker-entrypoint-initdb.d
    networks:
      - cms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:8.8.0-alpine
    container_name: cms_redis
    restart: unless-stopped
    command: redis-server --requirepass ${CACHE_PASSWORD:-redis123}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - cms-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
  rustfs:
    image: rustfs/rustfs:latest
    environment:
      - RUSTFS_SERVER_DOMAINS=localhost
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_SECRET_KEY=rustfsadmin
      - RUSTFS_ACCESS_KEY=rustfsadmin
    volumes:
      - "/tmp/rustfs/data:/data"
    ports:
      - "9001:9001"
      - "9000:9000"
    container_name: rustfs_container
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
  meilisearch:
    image: getmeili/meilisearch:v1.37
    container_name: cms_meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey}
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - cms-network
  # Application
  app:
    # image: golang-hexagonal:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cms_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Database configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-hexagonal_db}

      # Redis configuration
      CACHE_URI: redis:6379
      CACHE_PASSWORD: ${CACHE_PASSWORD:-redis123}

      # Application configuration
      GIN_MODE: ${GIN_MODE:-release}

      # Firebase configuration (if needed)
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CREDENTIALS: ${FIREBASE_CREDENTIALS:-}

      # Stripe configuration (if needed)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cms-network
    # Uncomment if you need to mount .env or credentials file
    # volumes:
    #   - ./.env:/home/appuser/.env:ro
    #   - ./firebase-credentials.json:/home/appuser/firebase-credentials.json:ro

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  meilisearch_data:
    driver: local

networks:
  cms-network:
    driver: bridge
